syntax = "proto3";
// package = "proto";

// chamado pelo front-end e pelo orders_server
service CatalogueService {
    rpc Query(QueryRequest) returns (QueryResponse);
    rpc Update(UpdateRequest) returns (UpdateResponse);
    rpc ListAll(ListAllRequest) returns (ListAllResponse);
}

service OrdersService {
    rpc Buy(OrderRequest) returns (OrderResponse);
}

// chamado pelo cliente
service FrontendService {
    rpc Search(SearchRequest) returns (SearchResponse);
    rpc Lookup(LookupRequest) returns (LookupResponse);
    rpc Buy(BuyRequest) returns (BuyResponse);
    rpc ListAll(ListAllRequest) returns (ListAllResponse);
}

message QueryRequest {
    string arg = 1;
}

message QueryResponse {
    bool success = 1;
    string error = 2;
    // caso arg for um item_number, retorna isso:
    string name = 3;
    string topic = 4;
    int32 stock = 5;
    // caso arg for um topico (e.g romance), retorna isso:
    repeated int32 item_numbers = 6;
}

message UpdateRequest {
    int32 item_number = 1;
    int32 qty = 2;
}

message UpdateResponse {
    bool success = 1;
    string error = 2;
}

message OrderRequest {
    int32 item_number = 1;
}

message OrderResponse {
    bool success = 1;
    string error = 2;
}

// === Mensagens para FrontendService (cliente) ===

message SearchRequest {
    string topic = 1;
}

message SearchResponse {
    bool success = 1;
    string error = 2;
    repeated int32 item_numbers = 3;
}

message LookupRequest {
    int32 item_number = 1;
}

message LookupResponse {
    bool success = 1;
    string error = 2;
    string name = 3;
    string topic = 4;
    int32 stock = 5;
}

message BuyRequest {
    int32 item_number = 1;
}

message BuyResponse {
    bool success = 1;
    string error = 2;
}

message ListAllRequest {
}

message Book {
    int32 item_number = 1;
    string name = 2;
    string topic = 3;
    int32 stock = 4;
}

message ListAllResponse {
    bool success = 1;
    string error = 2;
    repeated Book books = 3;
}